<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; padding: 18px; color:#222; }
    h2 { margin-top: 0; }
    .card {
      background:#fff8d8;
      border:2px solid #ffd84d;
      border-radius:14px;
      padding:16px;
      margin-bottom:14px;
    }
    .name { font-size:22px; font-weight:800; margin-top: 8px; }
    .small { color:#666; margin-top: 6px; }
    button {
      border:0;
      border-radius:10px;
      padding:11px 16px;
      font-weight:700;
      cursor:pointer;
      margin-right:8px;
    }
    .primary { background:#2457c5; color:white; }
    .secondary { background:#e5e5e5; color:#222; }
    .status { margin-top:14px; font-weight:700; color:#2457c5; }
  </style>
</head>
<body>
  <div class="card">
    <h2>⭐ Guest Speller Tonight</h2>
    <div class="name"><?!= guestSpellerName ?></div>
    <div class="small"><?!= guestDateTimeText ?></div>
  </div>

  <button class="primary" onclick="createPacket()">Create Guest Packet</button>
  <button class="secondary" onclick="google.script.host.close()">Skip</button>

  <div class="status" id="status"></div>

  <script>
    const data = <?!= dataJson ?>;

    function createPacket() {
      document.getElementById("status").textContent = "Creating guest speller packet...";

      google.script.run
        .withSuccessHandler(result => {
          document.getElementById("status").innerHTML =
            'Done.<br><br>' +
            '<a href="' + result.folderUrl + '" target="_blank">Open Folder</a><br>' +
            '<a href="' + result.slideUrl + '" target="_blank">Open Slide</a><br>' +
            '<a href="' + result.pdfUrl + '" target="_blank">Open PDF</a><br>' +
            '<a href="' + result.pdfDownloadUrl + '" target="_blank">Download PDF</a>';
        })
        .withFailureHandler(error => {
          document.getElementById("status").textContent = "Error: " + error.message;
        })
        .createGuestSpellerPacketFromPrep(data);
    }
  </script>
</body>
</html>
